db.type=h2
db.driverClass=org.h2.Driver
db.jdbcUrl=jdbc:h2:mem:shopizer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.user=sa
db.password=

