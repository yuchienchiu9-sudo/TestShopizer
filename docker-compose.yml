version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14
    container_name: shopizer-postgres
    environment:
      POSTGRES_DB: SALESMANAGER
      POSTGRES_USER: shopizer
      POSTGRES_PASSWORD: shopizer123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopizer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopizer"]
      timeout: 20s
      retries: 10

  # 后端 API
  shopizer-backend:
    image: shopizerecomm/shopizer:latest
    container_name: shopizer-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/SALESMANAGER
      SPRING_DATASOURCE_USERNAME: shopizer
      SPRING_DATASOURCE_PASSWORD: shopizer123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shopizer-network

  # 店铺前端（React）
  shopizer-shop:
    image: shopizerecomm/shopizer-shop-reactjs:latest
    container_name: shopizer-shop
    ports:
      - "80:80"
    environment:
      APP_MERCHANT: DEFAULT
      APP_BASE_URL: http://localhost:8080
    depends_on:
      - shopizer-backend
    networks:
      - shopizer-network

  # 管理后台前端
  shopizer-admin:
    image: shopizerecomm/shopizer-admin:latest
    container_name: shopizer-admin
    ports:
      - "82:80"
    environment:
      APP_BASE_URL: http://localhost:8080/api
    depends_on:
      - shopizer-backend
    networks:
      - shopizer-network

volumes:
  mysql_data:
  postgresver: local

networks:
  shopizer-network:
    driver: bridge
